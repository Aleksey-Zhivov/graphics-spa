<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="An interactive canvas playground for experimenting with generative graphics."
    />
    <title>Orbital Lab</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="scene" aria-hidden="true"></canvas>

    <main class="shell">
      <header class="topbar">
        <a class="brand" href="#" aria-label="Orbital Lab home">
          <span class="brand-mark"></span>
          <span>Orbital Lab</span>
        </a>
        <p class="status"><span></span> Live canvas experiment</p>
      </header>

      <section class="hero">
        <div class="eyebrow">Generative playground / 001</div>
        <h1>Shape the<br /><em>field.</em></h1>
        <p class="intro">
          Move through a responsive particle system. Change its behavior,
          tune the atmosphere, and make every frame your own.
        </p>
      </section>

      <aside class="panel" aria-label="Graphics controls">
        <div class="panel-heading">
          <span>Control deck</span>
          <button id="randomize" class="icon-button" type="button" aria-label="Randomize settings">
            Shuffle
          </button>
        </div>

        <fieldset>
          <legend>Motion</legend>
          <div class="segmented">
            <button class="mode is-active" type="button" data-mode="orbit">Orbit</button>
            <button class="mode" type="button" data-mode="flow">Flow</button>
            <button class="mode" type="button" data-mode="pulse">Pulse</button>
          </div>
        </fieldset>

        <label class="range-row">
          <span>Energy <output id="energyValue">52</output></span>
          <input id="energy" type="range" min="10" max="100" value="52" />
        </label>

        <label class="range-row">
          <span>Density <output id="densityValue">70</output></span>
          <input id="density" type="range" min="20" max="120" value="70" />
        </label>

        <fieldset>
          <legend>Spectrum</legend>
          <div class="swatches">
            <button class="swatch is-active" type="button" data-palette="acid" aria-label="Acid palette"></button>
            <button class="swatch" type="button" data-palette="ember" aria-label="Ember palette"></button>
            <button class="swatch" type="button" data-palette="ice" aria-label="Ice palette"></button>
            <button class="swatch" type="button" data-palette="mono" aria-label="Monochrome palette"></button>
          </div>
        </fieldset>

        <button id="pause" class="primary-button" type="button">
          <span>Pause field</span>
          <span class="pause-icon">Ⅱ</span>
        </button>
      </aside>

      <footer>
        <span>Canvas / Vanilla JS</span>
        <span>Move your cursor to bend the field</span>
      </footer>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
